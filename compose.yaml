services:
  postgres:
    image: postgres:16-alpine
    container_name: saurysrc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saurysrc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saurysrc"]
      interval: 5s
      timeout: 5s
      retries: 10

  src:
    image: ghcr.io/saurlax/saurysrc:${SAURYSRC_TAG:-latest}
    container_name: saurysrc
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/saurysrc
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD}
      NUXT_PUBLIC_CAS_BASE_URL: ${NUXT_PUBLIC_CAS_BASE_URL}
      NUXT_PUBLIC_CAS_SERVICE_URL: ${NUXT_PUBLIC_CAS_SERVICE_URL}

volumes:
  postgres_data:
